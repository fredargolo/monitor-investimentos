
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;
    --text:#e2e2f0;--muted:#6b6b8a;
    --green:#00d68f;--red:#ff4d6d;--amber:#ffb347;--blue:#4d9fff;
    --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--mono);padding:14px;min-height:100vh}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
  .title{font-family:var(--sans);font-size:20px;font-weight:800;letter-spacing:-.5px}
  .title span{color:var(--green)}
  .sub{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.05em}
  .btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--green);color:var(--green)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .spin{display:inline-block;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .prices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .pc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
  .pc-label{font-size:10px;color:var(--muted);letter-spacing:.07em;margin-bottom:4px}
  .pc-val{font-size:17px;font-weight:700}
  .pc-sub{font-size:10px;margin-top:3px}
  .g{color:var(--green)}.r{color:var(--red)}.a{color:var(--amber)}.m{color:var(--muted)}

  .sec-title{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-family:var(--sans);font-weight:600;margin:14px 0 7px;padding-bottom:6px;border-bottom:1px solid var(--border)}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-bottom:6px;display:grid;grid-template-columns:12px 1fr auto auto;gap:10px;align-items:center;transition:border-color .3s,background .3s}
  .card.ativo{border-color:var(--green);background:#00d68f0a}
  .card.proximo{border-color:var(--amber);background:#ffb3470a}
  .card.venc{border-color:var(--blue);background:#4d9fff0a}

  .sdot{width:10px;height:10px;border-radius:50%}
  .sg{background:var(--green);box-shadow:0 0 7px var(--green)}
  .sa{background:var(--amber);box-shadow:0 0 7px var(--amber)}
  .sb{background:var(--blue);box-shadow:0 0 7px var(--blue)}
  .sm{background:var(--border)}

  .info-name{font-size:12px;font-weight:500;margin-bottom:2px}
  .info-trig{font-size:11px;color:var(--muted)}
  .info-trig b{color:var(--amber)}
  .info-obs{font-size:10px;color:var(--muted);margin-top:3px}
  .pbar{height:3px;background:var(--border);border-radius:2px;margin-top:4px}
  .pfill{height:100%;border-radius:2px;transition:width .8s}

  .dist{text-align:right}
  .dist-val{font-size:12px;font-weight:700}
  .dist-lbl{font-size:10px;color:var(--muted);margin-top:1px}

  .aporte{text-align:right}
  .ap-val{font-size:13px;font-weight:700;color:var(--green)}
  .ap-lbl{font-size:10px;color:var(--muted)}

  .tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.06em;margin-left:6px;vertical-align:middle}
  .tg{background:#00d68f22;color:var(--green);border:1px solid #00d68f44}
  .ta{background:#ffb34722;color:var(--amber);border:1px solid #ffb34744}
  .tb{background:#4d9fff22;color:var(--blue);border:1px solid #4d9fff44}
  .tm{background:var(--border);color:var(--muted)}

  .footer{margin-top:14px;display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding-top:10px;border-top:1px solid var(--border)}
  .err{background:#ff4d6d11;border:1px solid #ff4d6d44;color:var(--red);font-size:11px;padding:8px 12px;border-radius:6px;margin-bottom:10px;display:none}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">MONITOR DE <span>GATILHOS</span></div>
    <div class="sub">CARTEIRA FRED · 22/ABR/2026</div>
  </div>
  <button class="btn" id="btn" onclick="atualizar()">
    <span id="icon">⟳</span> Atualizar Preços
  </button>
</div>

<div class="err" id="err"></div>

<div class="prices">
  <div class="pc">
    <div class="pc-label">BTC / USD</div>
    <div class="pc-val" id="pBtcUsd">—</div>
    <div class="pc-sub m" id="sBtcUsd">aguardando...</div>
  </div>
  <div class="pc">
    <div class="pc-label">BTC / BRL</div>
    <div class="pc-val" id="pBtcBrl">—</div>
    <div class="pc-sub m">calculado</div>
  </div>
  <div class="pc">
    <div class="pc-label">USD / BRL</div>
    <div class="pc-val" id="pUsdBrl">—</div>
    <div class="pc-sub m" id="sUsdBrl">aguardando...</div>
  </div>
  <div class="pc">
    <div class="pc-label">BOVA11</div>
    <div class="pc-val" id="pBova">R$192</div>
    <div class="pc-sub m">atualizar manualmente</div>
  </div>
</div>

<div id="content"></div>

<div class="footer">
  <span>⚡ Dados: CoinGecko (BTC) + ExchangeRate-API (câmbio)</span>
  <span id="tsUpdate">—</span>
</div>

<script>
let S = { btcUsd: null, usdBrl: null, bova: 192.64 }

const GATILHOS = [
  {
    titulo: '₿  BITCOIN — Aportes Táticos em Quedas',
    items: [
      { nome:'BTC · Nível L2', tipo:'btc_lt', ref:70000, aporte:'R$ 26.638', obs:'Compra a mercado na Ripio Trade' },
      { nome:'BTC · Nível L3', tipo:'btc_lt', ref:65000, aporte:'R$ 26.638', obs:'Compra a mercado na Ripio Trade' },
      { nome:'BTC · Nível L4', tipo:'btc_lt', ref:60000, aporte:'R$ 21.310', obs:'Cadastrar na Ripio quando L3 executar' },
      { nome:'BTC · Nível L5', tipo:'btc_lt', ref:55000, aporte:'R$ 10.655', obs:'Manter em caixa — só executar se atingir' },
    ]
  },
  {
    titulo: '🌎  IVVB11 / ETFs Dólar — Entrada por Câmbio',
    items: [
      { nome:'IVVB11 · 1º Lote', tipo:'fx_gt', ref:6.20, aporte:'R$ 10.000', obs:'1º lote — câmbio fraco favorece entrada' },
      { nome:'IVVB11 · 2º Lote', tipo:'fx_gt', ref:6.50, aporte:'R$ 10.000', obs:'2º lote — reforçar posição dolarizada' },
    ]
  },
  {
    titulo: '🇧🇷  BOVA11 — Correções Eleitorais',
    items: [
      { nome:'BOVA11 · 1ª Correção', tipo:'bova_lt', ref:175, aporte:'R$ 7.500', obs:'Ibov ~90k pts — correção eleitoral' },
      { nome:'BOVA11 · 2ª Correção', tipo:'bova_lt', ref:165, aporte:'R$ 7.500', obs:'Ibov ~85k pts — correção mais profunda' },
    ]
  },
  {
    titulo: '📅  Vencimentos Pós-Fixado — Realocar em IPCA+',
    items: [
      { nome:'C6 CDI + PAN · NOV/2026',   tipo:'venc', ref:'2026-11-01', aporte:'R$111.000', obs:'→ Buscar IPCA+8%+ em outubro' },
      { nome:'Caruana CDI · DEZ/2026',     tipo:'venc', ref:'2026-12-01', aporte:'R$ 85.500', obs:'→ IPCA+ e ETFs dólar' },
      { nome:'Afinz CDI · AGO/2027',       tipo:'venc', ref:'2027-08-01', aporte:'R$ 55.000', obs:'→ Pós-eleições — rebalancear' },
      { nome:'Agibank CDI · MAR/2028',     tipo:'venc', ref:'2028-03-01', aporte:'R$133.000', obs:'→ Maior vencimento — migrar para RV' },
    ]
  },
]

function diasAte(d) {
  return Math.ceil((new Date(d) - new Date()) / 86400000)
}

function status(item) {
  const { tipo, ref } = item
  const btc = S.btcUsd, fx = S.usdBrl, bv = S.bova

  if (tipo === 'btc_lt') {
    if (!btc) return { cls:'', dot:'sm', tag:'tm', tagTxt:'AGUARDAR', dist:'—', distCls:'m', pct:0, cor:'var(--border)' }
    const ativo = btc <= ref
    const pct = ativo ? 100 : Math.max(0, 100 - ((btc - ref) / ref * 100 * 3))
    const diff = ((btc - ref) / ref * 100)
    return ativo
      ? { cls:'ativo', dot:'sg', tag:'tg', tagTxt:'ATIVO!', dist:`US$${btc.toLocaleString('en')}`, distCls:'g', pct:100, cor:'var(--green)' }
      : { cls: pct>80?'proximo':'', dot: pct>80?'sa':'sm', tag: pct>80?'ta':'tm', tagTxt: pct>80?'ATENÇÃO':'AGUARDAR',
          dist:`+${diff.toFixed(1)}% acima`, distCls: pct>80?'a':'m', pct, cor: pct>80?'var(--amber)':'var(--border)' }
  }

  if (tipo === 'fx_gt') {
    if (!fx) return { cls:'', dot:'sm', tag:'tm', tagTxt:'AGUARDAR', dist:'—', distCls:'m', pct:0, cor:'var(--border)' }
    const ativo = fx >= ref
    const pct = Math.min(100, (fx / ref) * 100)
    const falta = ((ref - fx) / fx * 100)
    return ativo
      ? { cls:'ativo', dot:'sg', tag:'tg', tagTxt:'ATIVO!', dist:`R$${fx.toFixed(2)}`, distCls:'g', pct:100, cor:'var(--green)' }
      : { cls: pct>95?'proximo':'', dot: pct>95?'sa':'sm', tag: pct>95?'ta':'tm', tagTxt: pct>95?'ATENÇÃO':'AGUARDAR',
          dist:`falta +${falta.toFixed(1)}%`, distCls: pct>95?'a':'m', pct, cor: pct>95?'var(--amber)':'var(--border)' }
  }

  if (tipo === 'bova_lt') {
    const ativo = bv <= ref
    const pct = ativo ? 100 : Math.max(0, 100 - ((bv - ref) / ref * 100 * 5))
    const diff = ((bv - ref) / ref * 100)
    return ativo
      ? { cls:'ativo', dot:'sg', tag:'tg', tagTxt:'ATIVO!', dist:`R$${bv.toFixed(2)}`, distCls:'g', pct:100, cor:'var(--green)' }
      : { cls: pct>85?'proximo':'', dot: pct>85?'sa':'sm', tag: pct>85?'ta':'tm', tagTxt: pct>85?'ATENÇÃO':'AGUARDAR',
          dist:`-${diff.toFixed(1)}% p/ gatilho`, distCls: pct>85?'a':'m', pct, cor: pct>85?'var(--amber)':'var(--border)' }
  }

  if (tipo === 'venc') {
    const dias = diasAte(ref)
    const urgente = dias <= 45, proximo = dias <= 90
    const pct = Math.max(0, Math.min(100, (1 - dias / 400) * 100))
    const txt = dias <= 0 ? 'VENCIDO' : `${dias} dias`
    return {
      cls: urgente ? 'proximo' : 'venc',
      dot: urgente ? 'sa' : 'sb',
      tag: urgente ? 'ta' : 'tb',
      tagTxt: urgente ? 'URGENTE' : proximo ? 'EM BREVE' : 'AGENDADO',
      dist: txt, distCls: urgente ? 'a' : 'b', pct,
      cor: urgente ? 'var(--amber)' : 'var(--blue)'
    }
  }
  return { cls:'', dot:'sm', tag:'tm', tagTxt:'—', dist:'—', distCls:'m', pct:0, cor:'var(--border)' }
}

function render() {
  let html = ''
  GATILHOS.forEach(g => {
    html += `<div class="sec-title">${g.titulo}</div>`
    g.items.forEach(item => {
      const s = status(item)
      const trigTxt = item.tipo === 'btc_lt' ? `BTC cair abaixo de <b>US$${item.ref.toLocaleString('en')}</b>`
        : item.tipo === 'fx_gt' ? `Dólar subir acima de <b>R$${item.ref.toFixed(2)}</b>`
        : item.tipo === 'bova_lt' ? `BOVA11 cair abaixo de <b>R$${item.ref}</b>`
        : `Vencimento: <b>${item.ref}</b>`
      html += `
        <div class="card ${s.cls}">
          <div class="sdot ${s.dot}"></div>
          <div>
            <div class="info-name">${item.nome} <span class="tag ${s.tag}">${s.tagTxt}</span></div>
            <div class="info-trig">Gatilho: ${trigTxt}</div>
            <div class="pbar"><div class="pfill" style="width:${s.pct}%;background:${s.cor}"></div></div>
            <div class="info-obs">${item.obs}</div>
          </div>
          <div class="dist">
            <div class="dist-val ${s.distCls}">${s.dist}</div>
            <div class="dist-lbl">situação</div>
          </div>
          <div class="aporte">
            <div class="ap-val">${item.aporte}</div>
            <div class="ap-lbl">aporte</div>
          </div>
        </div>`
    })
  })
  document.getElementById('content').innerHTML = html
}

async function atualizar() {
  const btn = document.getElementById('btn')
  const icon = document.getElementById('icon')
  btn.disabled = true
  icon.innerHTML = '<span class="spin">⟳</span>'
  document.getElementById('err').style.display = 'none'

  let btcOk = false, fxOk = false

  // BTC via CoinGecko (público, sem API key)
  try {
    const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd,brl', {cache:'no-store'})
    if (r.ok) {
      const d = await r.json()
      S.btcUsd = d.bitcoin.usd
      S.usdBrl = d.bitcoin.brl / d.bitcoin.usd
      document.getElementById('pBtcUsd').textContent = `$${S.btcUsd.toLocaleString('en-US')}`
      document.getElementById('pBtcBrl').textContent = `R$${Math.round(d.bitcoin.brl/1000)}k`
      document.getElementById('pUsdBrl').textContent = `R$${S.usdBrl.toFixed(2)}`
      const btcStatus = S.btcUsd <= 65000 ? '🟢 Gatilho ativo!' : S.btcUsd <= 70000 ? '🟡 Próximo L2' : '⚪ Acima dos níveis'
      const fxStatus = S.usdBrl >= 6.20 ? '🟢 IVVB11 ativo!' : S.usdBrl >= 6.00 ? '🟡 Quase R$6,20' : '⚪ Aguardando R$6,20'
      document.getElementById('sBtcUsd').textContent = btcStatus
      document.getElementById('sBtcUsd').className = 'pc-sub ' + (S.btcUsd <= 65000 ? 'g' : S.btcUsd <= 70000 ? 'a' : 'm')
      document.getElementById('sUsdBrl').textContent = fxStatus
      document.getElementById('sUsdBrl').className = 'pc-sub ' + (S.usdBrl >= 6.20 ? 'g' : 'm')
      btcOk = fxOk = true
    }
  } catch(e) {}

  if (!btcOk) {
    document.getElementById('err').textContent = 'Erro ao buscar preços. A CoinGecko pode ter limitado as requisições — tente novamente em 1 minuto.'
    document.getElementById('err').style.display = 'block'
  }

  document.getElementById('tsUpdate').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR')
  render()
  btn.disabled = false
  icon.textContent = '⟳'
}

// Render inicial com últimos valores conhecidos
S.btcUsd = 76340; S.usdBrl = 5.85
document.getElementById('pBtcUsd').textContent = '~$76.340'
document.getElementById('pBtcBrl').textContent = '~R$446k'
document.getElementById('pUsdBrl').textContent = '~R$5,85'
document.getElementById('sBtcUsd').textContent = '⚪ Acima dos níveis'
document.getElementById('sUsdBrl').textContent = '⚪ Aguardando R$6,20'
document.getElementById('tsUpdate').textContent = 'Valores de ~22/abr — clique Atualizar'
render()
</script>
</body>
</html>
